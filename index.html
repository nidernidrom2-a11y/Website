<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 40px;
            max-width: 900px;
            margin: auto;
            background: white;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>A simple website made quickly</p>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</nav>

<div class="container" id="home">
    <h2>Home</h2>
    <p>Welcome to my website. This is the homepage.</p>
</div>

<div class="container" id="about">
    <h2>About</h2>
    <p>This section tells visitors something about the website.</p>
</div>

<div class="container" id="contact">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
